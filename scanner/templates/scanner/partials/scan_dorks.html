<div class="d-flex justify-content-between align-items-center mb-3">
    <h5><i class="bi bi-google me-2"></i>Google Dorks — Grouped by Subdomain</h5>
    <span class="text-muted small">{{ dorks.count }} dorks across subs</span>
</div>

{% regroup dorks by subdomain_name as dork_groups %}
{% if dork_groups %}
<div class="accordion" id="dorksAccordion">
    {% for group in dork_groups %}
    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                    data-bs-target="#dork-{{ forloop.counter }}">
                <span class="subdomain-cell me-2">{{ group.grouper }}</span>
                <span class="badge bg-secondary ms-2">{{ group.list|length }} dorks</span>
            </button>
        </h2>
        <div id="dork-{{ forloop.counter }}" class="accordion-collapse collapse" data-bs-parent="#dorksAccordion">
            <div class="accordion-body p-0">
                <table class="table table-sm mb-0">
                    {% for d in group.list %}
                    <tr><td style="width:100%"><code class="small">{{ d.query }}</code></td></tr>
                    {% endfor %}
                </table>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-center py-4 text-muted">No dorks generated</div>
{% endif %}
