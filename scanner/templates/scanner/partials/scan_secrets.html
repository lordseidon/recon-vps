{% load static %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5><i class="bi bi-key me-2"></i>Secrets Found ({{ secrets.count }})</h5>
    <button class="btn btn-sm btn-outline-warning" data-bs-toggle="modal" data-bs-target="#keywordModal">
        <i class="bi bi-eye me-1"></i>Manage Keywords
    </button>
</div>

{% if secrets %}
<div class="accordion" id="secretsAccordion">
    {% for s in secrets %}
    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                    data-bs-target="#secret-{{ forloop.counter }}">
                <span class="badge bg-warning-subtle text-warning-emphasis me-2">{{ s.detector_name }}</span>
                {% if s.verified %}
                <i class="bi bi-check-circle-fill text-success me-2" title="Verified"></i>
                {% endif %}
                <span class="text-muted small text-truncate" style="max-width:400px;">
                    {{ s.file_path|default:"unknown file" }}
                </span>
            </button>
        </h2>
        <div id="secret-{{ forloop.counter }}" class="accordion-collapse collapse" data-bs-parent="#secretsAccordion">
            <div class="accordion-body">
                <div class="d-flex justify-content-between mb-2">
                    <div>
                        <strong class="me-2">Detector:</strong> {{ s.detector_name }}
                        <span class="ms-3"><strong>File:</strong> <code class="small">{{ s.file_path|default:"—" }}</code></span>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input verify-toggle" type="checkbox" data-secret-id="{{ s.id }}"
                               {% if s.verified %}checked{% endif %}>
                        <label class="form-check-label small">Verified</label>
                    </div>
                </div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-warning">Raw Secret</label>
                        <pre class="bg-dark text-warning p-3 rounded secret-pre">{{ s.raw }}</pre>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-info">Raw V2</label>
                        <pre class="bg-dark text-info p-3 rounded secret-pre">{{ s.raw_v2 }}</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-center py-4 text-muted">
    <i class="bi bi-shield-check display-4 d-block mb-2"></i>No secrets found
</div>
{% endif %}

<script>
document.querySelectorAll('.verify-toggle').forEach(toggle => {
    toggle.addEventListener('change', async function() {
        const secretId = this.dataset.secretId;
        const resp = await fetch(`/api/scan/${secretId}/toggle-verify/`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
            body: JSON.stringify({secret_id: secretId}),
        });
    });
});
</script>
